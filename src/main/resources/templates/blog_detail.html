<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title th:text="${blog.title}"></title></head>
<body>

<div th:replace="fragments/header :: body"></div>

<h1 th:text="${blog.title}"></h1>

<p>
    作者：
    <a th:href="@{/account/{id}(id=${blog.author.id})}"
       th:text="${blog.author.displayName}"></a>
</p>

<p>投稿日：<span th:text="${blog.createdAt}"></span></p>

<hr>

<p th:text="${blog.content}"></p>
<a th:if="${#authentication.principal != null 
           and blog.author.username == #authentication.principal.username}"
   th:href="@{/blog/{id}/edit(id=${blog.id})}">
    編集する
</a>

</body>
</html>
