<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アカウント作成</title>
</head>
<body>

<div th:replace="~{fragments/layout-header :: header_fragment}"></div>
<div>
<h1>アカウント作成</h1>

<form th:action="@{"/account/register"}" method="post" th:object="${accountForm}">
    <label>ユーザー名：</label>
    <input type="text" th:field="*{username}"><br>
    <label>パスワード：</label>
    <input type="password" th:field="*{password}"><br>
    <label>自己紹介：</label><br>
    <textarea th:field="*{profileText}"></textarea><br>
    <button type="submit">登録</button>
</form>
</div>
</body>
</html>
