<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" xmlns:th="http://www.thymeleaf.org">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ホーム</title>
</head>
<body>
<div class="container">
    <h2>記事を投稿</h2>

    <form th:action="@{/blogs/create}" method="post">   //@入力値の送信先 
        <div class="form-group">
            <input type="text" name="title" placeholder="タイトルを入力" class="title-input" required>
            <input type="text" name="mainText" placeholder="本文を入力" class="mainText-input" required>
            <input type="text" name="category" placeholder="カテゴリを入力" class="category-input" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-submit">保存</button>
            <a href="/blogs" class="link-cancel">キャンセル</a>
        </div>
    </form>
</div>
</body>
</html>
